name: Update ORCID publications

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * 1'

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate publications markdown
        run: python scripts/update_publications.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: auto-update ORCID publications"
          git push
